# Community Edition overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.community.yml up -d --build
#
# This overlay switches the api, worker, beat, and flower services to build
# from the Community Dockerfiles, which strip Business-only route and workflow
# files before the image is finalised. The resulting images contain only the
# Community feature set; Business endpoints simply return 404 rather than 403.

services:
  api:
    build:
      dockerfile: Dockerfile.community

  worker:
    build:
      dockerfile: Dockerfile.community

  beat:
    build:
      dockerfile: Dockerfile.community

  flower:
    build:
      dockerfile: Dockerfile.community
