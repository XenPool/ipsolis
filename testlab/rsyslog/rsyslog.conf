# Minimal rsyslog config for the ipSolis testlab.
# Listens on TCP/UDP 5140 (non-privileged) and writes everything received
# to /var/log/testlab/all.log so smoke tests can grep for expected events.

module(load="imudp")
input(type="imudp" port="5140")

module(load="imtcp")
input(type="imtcp" port="5140")

# Single catch-all log — keeps the test loop simple.
$template TestlabFmt,"%timegenerated% %HOSTNAME% %syslogtag% %msg%\n"
*.* /var/log/testlab/all.log;TestlabFmt

# Skip the default /etc/rsyslog.d/*.conf includes — we don't need /var/log/{auth,messages,...}
# in the testlab container; they just spam the host volume.
