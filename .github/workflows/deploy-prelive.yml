name: Deploy to prelive

on:
  push:
    branches:
      - prelive

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd ${{ secrets.PRELIVE_PATH }}
          git pull origin prelive

      - name: Rebuild and restart containers
        run: |
          cd ${{ secrets.PRELIVE_PATH }}
          docker compose -f docker-compose.yml -f docker-compose.prelive.yml --profile dev up --build -d

      - name: Run database migrations
        run: |
          cd ${{ secrets.PRELIVE_PATH }}
          docker compose exec -T api alembic upgrade head

      - name: Health check
        run: |
          sleep 10
          curl -fk https://it-selfservice-pre.xenpool.local/health || exit 1
