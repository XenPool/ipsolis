<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – {{ app_title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
  <div class="max-w-sm w-full mx-4">

    <div class="text-center mb-8">
      <span class="text-sm font-semibold text-gray-900 tracking-wide">{{ app_title }}</span>
      <p class="text-xs text-gray-400 mt-1">Admin Console</p>
    </div>

    <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-8">

      {% if error %}
      <div class="mb-5 px-4 py-3 rounded bg-red-50 border border-red-200 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/ui/login" class="space-y-5">
        <div>
          <label for="password" class="block text-xs font-medium text-gray-700 mb-1">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            required
            autofocus
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Enter admin password"
          >
        </div>

        <button
          type="submit"
          class="w-full px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors">
          Sign in
        </button>
      </form>

    </div>

  </div>
</body>
</html>
