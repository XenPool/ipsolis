<script>
  (function() {
    try {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (saved === null && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    } catch (e) { /* localStorage blocked */ }
  })();
</script>
<style>
  :root {
    --surface: 255 255 255;
    --surface-raised: 248 250 252;
    --token-border: 226 232 240;
    --body: 15 23 42;
    --heading: 15 23 42;
    --muted: 100 116 139;
    /* Render native controls (date picker, scrollbars, …) in light mode. */
    color-scheme: light;
  }
  html.dark {
    --surface: 15 23 42;
    --surface-raised: 30 41 59;
    --token-border: 51 65 85;
    --body: 226 232 240;
    --heading: 255 255 255;
    --muted: 148 163 184;
    /* Render native controls (date picker, scrollbars, …) in dark mode so
       the calendar icon / popup / placeholder stay legible on dark surfaces. */
    color-scheme: dark;
  }
  html, body { font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
</style>
