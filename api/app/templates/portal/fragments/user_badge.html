{% if result.success %}
<span class="inline-flex items-center gap-1 text-xs text-green-700"
      data-valid="true" data-email="{{ result.email }}" data-name="{{ result.display_name }}">
  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
  </svg>
  {{ result.display_name }}{% if result.email %} &middot; {{ result.email }}{% endif %}
</span>
{% else %}
<span class="inline-flex items-center gap-1 text-xs text-red-600"
      data-valid="false" data-email="" data-name="">
  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
  </svg>
  <span data-i18n="portal.common.not_found_in_directory">Not found in directory</span>
</span>
{% endif %}
