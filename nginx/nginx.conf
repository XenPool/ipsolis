server {
    listen 80;
    server_name ipsolis-pre.xenpool.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ipsolis-pre.xenpool.local;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Backup uploads can be large (a 10k-row deployment dumps to several
    # hundred MB gzipped). nginx's default 1m would 413 anything real.
    # The api validates size server-side again so this is a perimeter cap
    # rather than a precise enforcement.
    client_max_body_size 2g;

    # WebSocket / HTMX SSE support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    location / {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
